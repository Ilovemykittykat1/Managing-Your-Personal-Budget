<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Navigation Styling */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ff69b4;
      padding: 10px 20px;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
      gap: 8px;
    }

    .logo svg {
      width: 24px;
      height: 24px;
      fill: #add8e6;
    }

    .nav-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-center ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .nav-center ul li {
      margin: 0 15px;
    }

    .nav-center ul li a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .nav-center ul li a:hover {
      text-decoration: underline;
    }

    /* Center Content */
    h1 {
      text-align: center;
      margin-top: 20px;
    }

    #summary {
      text-align: center;
      background-color: #f8d7da;
      padding: 20px;
      width: 50%;
      margin: 20px auto;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }

    table {
      margin: auto;
    }
  </style>
</head>
<body style="background-image: url('images/background.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;">

  <!-- Navigation Menu -->
  <nav>
    <!-- Logo on the left -->
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
        <path d="M528 448H112a16 16 0 0 1-16-16V235.7L149.5 273a16 16 0 0 0 22.6 0l64-64 64 96a16 16 0 0 0 26.7 0l64-96 64 64a16 16 0 0 0 22.6 0L544 235.7V432a16 16 0 0 1-16 16zM96 144a48 48 0 1 1 48-48 48 48 0 0 1-48 48zm448 0a48 48 0 1 1 48-48 48 48 0 0 1-48 48zm-224 0a48 48 0 1 1 48-48 48 48 0 0 1-48 48z" />
      </svg>
      <span>Code Queens</span>
    </div>

    <!-- Centered navigation -->
    <div class="nav-center">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="tracker.html">Budget Planner</a></li>
        <li><a href="plans.html">Plans & Pricing</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </div>
  </nav>

  <h1>Budget Tracker</h1>

  <!-- Form to Add Transactions -->
  <form id="budget-form" style="text-align: center;">
    <label for="type">Type:</label>
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <label for="amount">Amount:</label>
    <input type="number" id="amount" required />

    <label for="category">Category:</label>
    <select id="category">
      <option value="Salary">Salary</option>
      <option value="Food">Food</option>
      <option value="Rent">Rent</option>
      <option value="Transportation">Transportation</option>
      <option value="Shopping">Shopping</option>
    </select>

    <label for="date">Date:</label>
    <input type="date" id="date" required />

    <button type="submit">Add Transaction</button>
  </form>

  <!-- Financial Summary -->
  <div id="summary">
    <h2>Financial Summary</h2>
    <p>Total Income: <span id="total-income">$0.00</span></p>
    <p>Total Expenses: <span id="total-expenses">$0.00</span></p>
    <p>Balance: <span id="balance">$0.00</span></p>
    <p id="warning" style="color: red; display: none;">
      Warning: You are spending more than you earn!
    </p>
  </div>

  <!-- Transaction Table -->
  <h2 style="text-align: center;">Transaction History</h2>
  <table border="1">
    <thead>
      <tr>
        <th>Type</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="transaction-list">
      <!-- Transactions will be added dynamically -->
    </tbody>
  </table>

  <!-- Buttons -->
  <div style="text-align: center; margin-top: 20px;">
    <button id="export-csv">Download CSV</button>
    <button id="clear-transactions">Clear Transactions</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
