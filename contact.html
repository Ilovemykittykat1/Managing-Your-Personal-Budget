<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Navigation Styling */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ff69b4;
      padding: 10px 20px;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
      gap: 8px;
    }

    .logo svg {
      width: 24px;
      height: 24px;
      fill: #add8e6;
    }

    .nav-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-center ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .nav-center ul li {
      margin: 0 15px;
    }

    .nav-center ul li a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .nav-center ul li a:hover {
      text-decoration: underline;
    }

    form {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #ff69b4;
      color: white;
      padding: 10px 20px;
      border: none;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #d63384;
    }
  </style>
</head>
<body style="background-image: url('images/background.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;">

  <!-- Navigation Menu -->
  <nav>
    <!-- Logo on the left -->
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
        <path d="M528 448H112a16 16 0 0 1-16-16V235.7L149.5 273a16 16 0 0 0 22.6 0l64-64 64 96a16 16 0 0 0 26.7 0l64-96 64 64a16 16 0 0 0 22.6 0L544 235.7V432a16 16 0 0 1-16 16zM96 144a48 48 0 1 1 48-48 48 48 0 0 1-48 48zm448 0a48 48 0 1 1 48-48 48 48 0 0 1-48 48zm-224 0a48 48 0 1 1 48-48 48 48 0 0 1-48 48z" />
      </svg>
      <span>Code Queens</span>
    </div>

    <!-- Centered navigation -->
    <div class="nav-center">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="tracker.html">Budget Planner</a></li>
        <li><a href="plans.html">Plans & Pricing</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </div>
  </nav>

  <h1 style="text-align:center;">Contact Sleek & Sassy</h1>

  <form action="https://formspree.io/f/xqapkayz" method="POST">
    <label for="name">Your Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Your Email:</label>
    <input type="email" id="email" name="_replyto" required>

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit">Send Message</button>
  </form>

</body>
</html>
